<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verifying Blockchain Inscription...</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#0f1117;
    color:#ffffff;

    font-family:Arial,Helvetica,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    width:100vw;
    height:100vh;

}

.card{

    width:420px;
    max-width:90%;

    background:#181b23;

    border-radius:24px;

    padding:45px;

    text-align:center;

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);

}

.logo{

    font-size:26px;
    font-weight:700;
    margin-bottom:12px;

}

.subtitle{

    color:#c5c8d1;
    font-size:16px;

    margin-bottom:35px;

}

.spinner{

    width:54px;
    height:54px;

    border-radius:50%;

    border:5px solid rgba(255,255,255,.12);
    border-top:5px solid #d4af37;

    margin:0 auto 30px;

    animation:spin .9s linear infinite;

}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }

}

.status{

    font-size:20px;
    font-weight:600;

    margin-bottom:10px;

}

.message{

    color:#b7bcc8;
    line-height:1.6;

}

.footer{

    margin-top:35px;

    font-size:13px;

    color:#777;

}

</style>

</head>

<body>

<div class="card">

    <div class="logo">
        Digital Music Romania
    </div>

    <div class="subtitle">
        Blockchain Certified Music
    </div>

    <div class="spinner"></div>

    <div class="status">
        Verifying Inscription
    </div>

    <div class="message">
        Please wait while we verify the authenticity of this blockchain record...
    </div>

    <div class="footer">
        Redirecting securely...
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const songId = params.get("song");

fetch("../data.json")
.then(response => response.json())
.then(data => {

    const song = data.songs.find(song => song.id === songId);

    if(song){

        setTimeout(() => {

            window.location.replace(song.blockchain_url);

        }, 700);

    }else{

        document.querySelector(".status").textContent = "Song not found";

        document.querySelector(".message").textContent =
        "The requested release could not be found.";

    }

})
.catch(() => {

    document.querySelector(".status").textContent = "Connection Error";

    document.querySelector(".message").textContent =
    "Unable to load release information.";

});

</script>

</body>

</html>
